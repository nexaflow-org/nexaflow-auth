name: FinAgent Notification
description: Send FinAgent CI notifications by email and Slack

inputs:
  pipeline_name:
    required: true
  repository_name:
    required: true
  failure_reason:
    required: true
  author:
    required: true
  smtp_username:
    required: true
  smtp_password:
    required: true
  mail_from:
    required: true
  mail_to:
    required: true
  slack_webhook:
    required: true
  workflow_url:
    required: true
  report_url:
    required: true

runs:
  using: composite
  steps:

    - name: Send email
      uses: hilarion5/send-mail@v1
      with:
        smtp-server: smtp.hostinger.com
        smtp-port: 587
        smtp-secure: false
        username: ${{ inputs.smtp_username }}
        password: ${{ inputs.smtp_password }}
        from-email: "FinAgent CI Alerts <${{ inputs.mail_from }}>"
        to-email: ${{ inputs.mail_to }}
        subject: "[FinAgent CI] ${{ inputs.pipeline_name }} failed for ${{ inputs.repository_name }}"
        html: |
          <div style="padding:24px;background:#f4f7fb;font-family:Arial,sans-serif;">
            <h2 style="margin:0 0 12px;color:#b91c1c;">FinAgent pipeline failure</h2>
            <p style="margin:0 0 16px;color:#334155;">
              A workflow in the ${{ inputs.repository_name }} repository needs attention.
            </p>

            <p><b>Pipeline:</b> ${{ inputs.pipeline_name }}</p>
            <p><b>Repository:</b> ${{ inputs.repository_name }}</p>
            <p><b>Triggered by:</b> ${{ inputs.author }}</p>
            <p><b>Failure summary:</b> ${{ inputs.failure_reason }}</p>

            <br/>

            <a href="${{ inputs.report_url }}"
               style="padding:12px 18px;background:#2563eb;color:#fff;text-decoration:none;border-radius:6px;">
               Open Report
            </a>

            <br/><br/>

            <a href="${{ inputs.workflow_url }}"
               style="padding:10px 14px;background:#111;color:#fff;text-decoration:none;border-radius:6px;">
               Open Workflow Run
            </a>
          </div>

    - name: Post to Slack
      uses: slackapi/slack-github-action@v3.0.1
      with:
        webhook: ${{ inputs.slack_webhook }}
        webhook-type: incoming-webhook
        payload: |
          attachments:
            - color: "#dc2626"
              blocks:

                - type: header
                  text:
                    type: plain_text
                    text: "FinAgent CI failure"

                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Pipeline*\n${{ inputs.pipeline_name }}"
                    - type: mrkdwn
                      text: "*Repository*\n${{ inputs.repository_name }}"

                - type: section
                  fields:
                    - type: mrkdwn
                      text: "*Triggered by*\n${{ inputs.author }}"
                    - type: mrkdwn
                      text: "*Failure summary*\n${{ inputs.failure_reason }}"

                - type: actions
                  elements:
                    - type: button
                      text:
                        type: plain_text
                        text: "Open Report"
                      url: "${{ inputs.report_url }}"
                      style: danger

                    - type: button
                      text:
                        type: plain_text
                        text: "Open Workflow Run"
                      url: "${{ inputs.workflow_url }}"
