name: Reusable Snyk Check

on:
  workflow_call:
    outputs:
      snyk_status:
        description: "Snyk outcome"
        value: ${{ jobs.snyk-scan.outputs.snyk_status }}
      notify_tool:
        description: "Tool name for notification"
        value: ${{ jobs.snyk-scan.outputs.notify_tool }}
      notify_title:
        description: "Notification title"
        value: ${{ jobs.snyk-scan.outputs.notify_title }}
      notify_summary:
        description: "Notification summary"
        value: ${{ jobs.snyk-scan.outputs.notify_summary }}

permissions:
  contents: read

jobs:
  snyk-scan:
    name: Snyk scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    outputs:
      snyk_status: ${{ steps.set_outputs.outputs.snyk_status }}
      notify_tool: ${{ steps.set_outputs.outputs.notify_tool }}
      notify_title: ${{ steps.set_outputs.outputs.notify_title }}
      notify_summary: ${{ steps.set_outputs.outputs.notify_summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Get pip cache directory
        id: pip-cache-dir
        run: |
          echo "dir=$(pip cache dir)" >> "$GITHUB_OUTPUT"

      - name: Restore pip cache
        id: pip-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.pip-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Snyk test for Python dependencies
        id: snyk-check
        uses: snyk/actions/python@master
        with:
          args: >-
            --file=requirements.txt
            --severity-threshold=high
            --project-name=${{ github.event.repository.name }}
            --target-reference=${{ github.ref_name }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Authenticate Snyk CLI
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk auth "$SNYK_TOKEN"

      - name: Publish project snapshot to Snyk UI
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk monitor \
            --file=requirements.txt \
            --project-name=${{ github.repository }}

      - name: Show Snyk outcome
        run: |
          echo "Snyk outcome: ${{ steps.snyk-check.outcome }}"

      - name: Set normalized outputs
        id: set_outputs
        run: |
          echo "snyk_status=${{ steps.snyk-check.outcome }}" >> "$GITHUB_OUTPUT"
          echo "notify_tool=snyk" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.snyk-check.outcome }}" = "failure" ]; then
            echo "notify_title=Snyk Security Scan Failed" >> "$GITHUB_OUTPUT"
            echo "notify_summary=Dependency vulnerabilities or policy issues were found in finagent-auth." >> "$GITHUB_OUTPUT"
          else
            echo "notify_title=Snyk Passed" >> "$GITHUB_OUTPUT"
            echo "notify_summary=No blocking Snyk issues were found in finagent-auth." >> "$GITHUB_OUTPUT"
          fi

      - name: Save pip cache before failing job
        if: ${{ steps.snyk-check.outcome == 'failure' && steps.pip-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.pip-cache-dir.outputs.dir }}
          key: ${{ steps.pip-cache.outputs.cache-primary-key }}



      - name: Stop pipeline - snyk scan failed
        if: ${{ steps.snyk-check.outcome == 'failure' }}
        run: |
          echo "Snyk scan failed. Stopping pipeline."
          exit 1
